name: Roll back production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Previously released v* tag
        required: true
        type: string
      allow_schema_mismatch:
        description: Confirm application/schema compatibility manually
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve immutable tag commit
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          refs="$(
            git ls-remote "https://github.com/${REPOSITORY}.git" \
              "refs/tags/${RELEASE_TAG}" "refs/tags/${RELEASE_TAG}^{}"
          )"
          release_sha="$(
            awk -v direct="refs/tags/${RELEASE_TAG}" '
              $2 == direct { base = $1 }
              $2 == direct "^{}" { peeled = $1 }
              END { print peeled != "" ? peeled : base }
            ' <<<"${refs}"
          )"
          [[ "${release_sha}" =~ ^[0-9a-f]{40}$ ]]
          printf 'tag=%s\nsha=%s\n' "${RELEASE_TAG}" "${release_sha}" \
            >>"${GITHUB_OUTPUT}"

      - name: Roll back through restricted SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          ALLOW_SCHEMA_MISMATCH: ${{ inputs.allow_schema_mismatch }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" >"${HOME}/.ssh/deploy_key"
          chmod 0600 "${HOME}/.ssh/deploy_key"
          trap 'rm -f "${HOME}/.ssh/deploy_key"' EXIT
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" >"${HOME}/.ssh/known_hosts"
          command="rollback ${RELEASE_TAG} ${RELEASE_SHA}"
          if [[ "${ALLOW_SCHEMA_MISMATCH}" == "true" ]]; then
            command="${command} --allow-schema-mismatch"
          fi
          ssh -i "${HOME}/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "${command}"
