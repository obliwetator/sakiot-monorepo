name: Deploy release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  test:
    if: github.event.deleted == false
    uses: ./.github/workflows/ci.yml

  deploy:
    if: github.event.deleted == false
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate release input
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Strict semver only: a typo like v1.23 or a suffix like v1.2.3-x must
          # not deploy production. Pre-release work goes through staging on main.
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - name: Deploy through restricted SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" >"${HOME}/.ssh/deploy_key"
          chmod 0600 "${HOME}/.ssh/deploy_key"
          trap 'rm -f "${HOME}/.ssh/deploy_key"' EXIT
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" >"${HOME}/.ssh/known_hosts"
          ssh -i "${HOME}/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "release ${RELEASE_TAG} ${RELEASE_SHA}"
