name: Deploy staging

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: staging-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Validate commit input
        env:
          STAGING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [[ "${STAGING_SHA}" =~ ^[0-9a-f]{40}$ ]]

      - name: Deploy through restricted SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          STAGING_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.ssh"
          printf '%s\n' "${DEPLOY_SSH_KEY}" >"${HOME}/.ssh/deploy_key"
          chmod 0600 "${HOME}/.ssh/deploy_key"
          trap 'rm -f "${HOME}/.ssh/deploy_key"' EXIT
          printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" >"${HOME}/.ssh/known_hosts"
          ssh -i "${HOME}/.ssh/deploy_key" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "staging ${STAGING_SHA}"
