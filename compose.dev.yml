services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sakiot_rouvas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "127.0.0.1:54320:5432"
    volumes:
      # postgres:18+ images keep data in a versioned subdirectory; mount the
      # parent so pg_upgrade --link works across major versions.
      - sakiot-dev-postgres:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d sakiot_rouvas" ]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  sakiot-dev-postgres:
